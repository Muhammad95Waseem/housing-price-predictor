<!DOCTYPE html>
<html>
    <head>
        <title>Housing Price Predictor</title>
        <link rel="stylesheet" href="../static/style.css">
    </head>
    <body>

        <h1>Housing Price Predictor</h1>

        <form action="/predict" method="POST">

            <label>Longitude</label>
            <input type="number" step="0.01" name="longitude" required>

            <label>Latitude</label>
            <input type="number" step="0.01" name="latitude" required>

            <label>Housing Median Age</label>
            <input type="number" name="housing_median_age" required>

            <label>Total Rooms</label>
            <input type="number" name="total_rooms" required>

            <label>Total Bedrooms</label>
            <input type="number" name="total_bedrooms" required>

            <label>Population</label>
            <input type="number" name="population" required>

            <label>Households</label>
            <input type="number" name="households" required>

            <label>Median Income</label>
            <input type="number" step="0.0001" name="median_income" required>

            <label>Ocean Proximity</label>

            <select name="ocean_proximity">

                <option value="NEAR BAY">NEAR BAY</option>
                <option value="INLAND">INLAND</option>
                <option value="NEAR OCEAN">NEAR OCEAN</option>
                <option value="ISLAND">ISLAND</option>
                <option value="<1H OCEAN">&lt;1H OCEAN</option>

            </select>

            <button type="submit">Predict House Value</button>

        </form>



        {% if prediction %}
        <hr>
        <h2>Predicted House Value</h2>
        <h2>${{ "{:,.0f}".format(prediction|float) }}</h2>
        {% endif %}

    </body>

</html>
